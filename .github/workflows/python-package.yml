name: Python Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # For PyPI trusted publishing

jobs:
  check:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, '[ci skip]') == false &&
      contains(github.event.head_commit.message, '[skip ci]') == false
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install nsjail build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf bison flex gcc g++ git \
            libprotobuf-dev libnl-route-3-dev libtool make \
            pkg-config protobuf-compiler

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: |
          python -m pip install --disable-pip-version-check -e . --group dev

      - name: Build nsjail binary
        run: |
          python setup.py bdist_wheel

      - name: Run linting
        run: |
          pre-commit run -a --all-files

      - name: Run type check
        run: |
          mypy src/nsjail

      - name: Run tests with coverage
        run: |
          pytest --cov --cov-branch --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          slug: tanbro/python-nsjail

  validate-tag:
    name: Validate Tag
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate version
        id: check
        run: |
          python3 -m pip install --disable-pip-version-check packaging
          python3 .github/scripts/validate_version.py

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: [validate-tag, check]
    if: |
      always() && needs.check.result == 'success' &&
      (needs.validate-tag.outputs.version != '' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build sdist
        run: |
          python3 -m pip install --disable-pip-version-check build
          python3 -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: Build wheel (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [validate-tag, check]
    if: |
      always() && needs.check.result == 'success' &&
      (needs.validate-tag.outputs.version != '' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request')
    strategy:
      fail-fast: true
      matrix:
        image:
          - manylinux_2_34_x86_64
          - manylinux_2_34_aarch64
          - musllinux_1_2_x86_64
          - musllinux_1_2_aarch64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        run: |
          # Select the appropriate build script based on image type
          if [[ "${{ matrix.image }}" == musllinux_* ]]; then
            BUILD_SCRIPT=build-wheels-musllinux.sh
          else
            BUILD_SCRIPT=build-wheels-manylinux.sh
          fi

          # Detect platform
          if [[ "${{ matrix.image }}" == *_aarch64 ]]; then
            PLATFORM=linux/arm64
          else
            PLATFORM=linux/amd64
          fi

          docker run --rm \
            -v $(pwd):/ws \
            -w /ws \
            --platform $PLATFORM \
            quay.io/pypa/${{ matrix.image }} \
            sh .github/scripts/$BUILD_SCRIPT

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.image }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-tag, build-sdist, build-wheels]
    if: |
      always() && needs.validate-tag.outputs.version != '' &&
      needs.build-sdist.result == 'success' && needs.build-wheels.result == 'success'
    environment:
      name: pypi
      url: https://pypi.org/p/nsjail
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheelhouse/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
          skip-existing: true
          verbose: true
